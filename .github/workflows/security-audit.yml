# Auditoría semanal de dependencias, independiente de pushes: el job
# `audit` de ci.yml solo corre cuando hay actividad, y un repo personal
# puede pasar semanas quieto mientras se publican CVEs.
name: Security Audit

on:
  schedule:
    - cron: '30 9 * * 1' # lunes 09:30 UTC = 04:30 América/Lima
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Sin install: npm audit lee package-lock directamente vía registry.
      - name: npm audit (high+, prod deps)
        run: npm audit --audit-level=high --omit=dev
