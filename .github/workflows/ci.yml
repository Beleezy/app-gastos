name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          # nuxi prepare necesita un valor cualquiera para arrancar
          SUPABASE_URL: 'http://localhost'
          SUPABASE_ANON_KEY: 'placeholder'

      - name: Run unit tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          SUPABASE_URL: 'http://localhost'
          SUPABASE_ANON_KEY: 'placeholder'

      - name: Build
        run: npm run build
        env:
          SUPABASE_URL: 'http://localhost'
          SUPABASE_ANON_KEY: 'placeholder'

  # Auditoría no bloqueante: reporta CVEs de severidad alta o crítica
  # en las dependencias. No falla el pipeline (continue-on-error) porque
  # los avisos transitorios sin patch disponible no deben bloquear merges.
  # El reporte queda visible en la pestaña de checks.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit (high+)
        run: npm audit --audit-level=high --omit=dev
