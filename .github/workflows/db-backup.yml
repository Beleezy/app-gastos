# Backup semanal de la BD (Supabase free no incluye backups).
# Ver docs/plan-mejoras-2026-07.md §1.3.
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   BACKUP_DATABASE_URL  — connection string DIRECTA (puerto 5432 o session
#                          pooler). pg_dump NO funciona sobre el pooler en
#                          modo transacción (puerto 6543). Si no está, se usa
#                          DATABASE_URL como fallback.
#   BACKUP_PASSPHRASE    — passphrase para cifrado simétrico GPG del dump.
#                          Generar con: openssl rand -base64 24
#                          GUARDARLA fuera del repo: sin ella el backup es
#                          irrecuperable.
#
# Restaurar un backup:
#   gpg --decrypt --batch --passphrase "$BACKUP_PASSPHRASE" backup.dump.gpg > backup.dump
#   pg_restore --clean --if-exists -d "$DATABASE_URL" backup.dump
#
# El ping semanal a la BD también cuenta como actividad para que Supabase
# free no pause el proyecto (complementa el uptime monitor, §1.4).

name: DB Backup

on:
  schedule:
    - cron: '0 9 * * 1' # lunes 09:00 UTC = 04:00 América/Lima
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verificar secrets
        id: check
        env:
          DB_URL: ${{ secrets.BACKUP_DATABASE_URL || secrets.DATABASE_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          if [ -z "$DB_URL" ] || [ -z "$PASSPHRASE" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Backup omitido — configura los secrets BACKUP_DATABASE_URL (o DATABASE_URL) y BACKUP_PASSPHRASE."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # pg_dump debe ser >= versión del servidor. El cliente de PGDG 17
      # puede volcar servidores 14–17 (cubre cualquier proyecto Supabase).
      - name: Instalar postgresql-client 17
        if: steps.check.outputs.configured == 'true'
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          sudo sed -i 's|deb |deb [signed-by=/usr/share/keyrings/pgdg.gpg] |' /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Dump + cifrado
        if: steps.check.outputs.configured == 'true'
        env:
          DB_URL: ${{ secrets.BACKUP_DATABASE_URL || secrets.DATABASE_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          FECHA=$(date -u +%Y-%m-%d)
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --format=custom --no-owner --no-privileges \
            --file="backup-$FECHA.dump"
          gpg --batch --symmetric --cipher-algo AES256 \
            --passphrase "$PASSPHRASE" \
            --output "backup-$FECHA.dump.gpg" "backup-$FECHA.dump"
          rm "backup-$FECHA.dump"
          ls -lh backup-*.gpg

      - name: Subir artifact (retención 90 días)
        if: steps.check.outputs.configured == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*.dump.gpg
          retention-days: 90
          if-no-files-found: error
